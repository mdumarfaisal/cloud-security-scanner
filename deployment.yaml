apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-scanner-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aws-scanner
  template:
    metadata:
      labels:
        app: aws-scanner
    spec:
      containers:
      - name: aws-scanner
        image: aws-scanner:1.0
        imagePullPolicy: Never
        ports:
        - containerPort: 8000
        envFrom:
        - secretRef:
            name: aws-credentials