<!DOCTYPE html>
<html>
<head>
    <title>Cloud Security Platform</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>☁️ SecureCloud</h2>
        <ul>
            <li onclick="showDashboard()">Dashboard</li>
            <li onclick="showHistory()">Scan History</li>
        </ul>
    </div>

    <!-- Main Content -->
    <div class="content">

        <!-- Loader -->
        <div id="loader" class="loader hidden">Scanning AWS Resources...</div>

        <!-- Dashboard Section -->
        <div id="dashboardSection">

            <div class="top-bar">
                <button onclick="triggerScan()">Run Scan</button>
                <div>Last Scan: <span id="lastScan"></span></div>
            </div>

            <div class="cards">
                <div class="card">
                    <h3>Total Issues</h3>
                    <p id="total"></p>
                </div>
                <div class="card">
                    <h3>Risk Score</h3>
                    <p id="risk"></p>
                </div>
                <div class="card">
                    <h3>Security Level</h3>
                    <p id="level"></p>
                </div>
            </div>

            <div class="charts">
                <canvas id="severityChart"></canvas>
                <canvas id="serviceChart"></canvas>
            </div>

            <div class="filters">
                <select id="severityFilter" onchange="loadDashboard()">
                    <option value="">All Severities</option>
                    <option value="CRITICAL">CRITICAL</option>
                    <option value="HIGH">HIGH</option>
                    <option value="MEDIUM">MEDIUM</option>
                </select>

                <input type="text" id="searchInput"
                       placeholder="Search resource..."
                       oninput="loadDashboard()">
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Service</th>
                        <th>Resource</th>
                        <th>Issue</th>
                        <th>Severity</th>
                        <th>Region</th>
                    </tr>
                </thead>
                <tbody id="findingsTable"></tbody>
            </table>

        </div>

        <!-- Scan History Section -->
        <div id="historySection" class="hidden">
            <h2>Scan History</h2>
            <table>
                <thead>
                    <tr>
                        <th>Scan Time</th>
                        <th>Risk Score</th>
                        <th>Security Level</th>
                    </tr>
                </thead>
                <tbody id="historyTable"></tbody>
            </table>
        </div>

    </div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
