<!DOCTYPE html>
<html>
<head>
    <title>Cloud Security Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            background: #f4f6f9;
        }

        h1 {
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 20px;
        }

        button:hover {
            background: #2980b9;
        }

        .card {
            background: white;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .risk {
            font-size: 22px;
            font-weight: bold;
        }

        .charts {
            display: flex;
            gap: 40px;
            flex-wrap: wrap;
        }

        .chart-box {
            width: 400px;
            height: 400px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #222;
            color: white;
        }

        .risk-bar-container {
            background: #ddd;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 10px;
        }

        .risk-bar {
            height: 20px;
            width: 0%;
        }
    </style>
</head>
<body>

<h1>☁️ Cloud Security Dashboard</h1>

<button onclick="triggerScan()">Run Scan</button>

<div class="card">
    <div>Total Issues: <span id="total"></span></div>
    <div class="risk">Risk Score: <span id="risk"></span></div>
    <div>Security Level: <span id="level"></span></div>

    <div class="risk-bar-container">
        <div id="riskBar" class="risk-bar"></div>
    </div>
</div>

<div class="card charts">
    <div class="chart-box">
        <canvas id="severityChart"></canvas>
    </div>

    <div class="chart-box">
        <canvas id="serviceChart"></canvas>
    </div>
</div>

<div class="card">
    <h3>Findings</h3>
    <table>
        <thead>
            <tr>
                <th>Service</th>
                <th>Resource</th>
                <th>Issue</th>
                <th>Severity</th>
                <th>Region</th>
            </tr>
        </thead>
        <tbody id="findingsTable"></tbody>
    </table>
</div>

<script src="/static/script.js"></script>

</body>
</html>
